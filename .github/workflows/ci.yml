name: ci

on:
  push:
    branches: ["*"]
    tags: ["v*"]
  pull_request:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: make lint
      - run: make test

  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: make build
      - run: make build-server

  release:
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: make build-all VERSION=${{ github.ref_name }}
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/agentlink-linux-amd64
            bin/agentlink-linux-arm64
            bin/agentlink-darwin-amd64
            bin/agentlink-darwin-arm64
            install.sh
          generate_release_notes: true
